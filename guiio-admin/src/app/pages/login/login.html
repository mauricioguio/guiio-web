<div class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-white">Guiio Admin</h1>
      <p class="text-gray-400 text-sm mt-1">Panel de administración</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="bg-gray-900 rounded-2xl p-8 space-y-5">
      @if (error()) {
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3">
          Usuario o contraseña incorrectos
        </div>
      }

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Usuario</label>
        <input
          formControlName="username"
          type="text"
          placeholder="Ingresa tu usuario"
          class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-gray-500 transition-colors"
        />
      </div>

      <div class="space-y-1">
        <label class="block text-sm text-gray-400">Contraseña</label>
        <div class="relative">
          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Ingresa tu contraseña"
            class="w-full bg-gray-800 border border-gray-700 text-white placeholder-gray-500 rounded-xl px-4 py-3 pr-12 text-sm focus:outline-none focus:border-gray-500 transition-colors"
          />
          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"
          >
            @if (showPassword) {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="w-full bg-white text-gray-900 font-semibold py-3 rounded-xl text-sm hover:bg-gray-100 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >
        @if (loading()) {
          Ingresando...
        } @else {
          Ingresar
        }
      </button>
    </form>
  </div>
</div>

<a [routerLink]="['/producto', product().id]"
   class="group block bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow duration-300">
  <!-- Image -->
  <div class="aspect-[7/11] overflow-hidden relative"
       [style.background-color]="product().colors.length > 0 ? product().colors[0].hex : '#f3f4f6'">
    <img [src]="cloudinaryUrl(product().images[0], 400)" [alt]="product().name"
         class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500"
         loading="lazy" onerror="this.style.display='none'">
    @if (!product().inStock) {
      <span class="absolute top-3 left-3 bg-gray-900 text-white text-xs px-2 py-1 rounded">
        Agotado
      </span>
    }
  </div>

  <!-- Info -->
  <div class="p-4">
    <p class="text-xs text-gray-400 uppercase tracking-widest mb-1">{{ product().collection }}</p>
    <h3 class="text-sm font-medium text-gray-900 mb-2">{{ product().name }}</h3>

    <!-- Colors -->
    <div class="flex gap-1.5 mb-3">
      @for (color of product().colors; track color.name) {
        <span class="w-4 h-4 rounded-full border border-gray-200 shadow-inner"
              [style.background-color]="color.hex"
              [title]="color.name">
        </span>
      }
    </div>

    <p class="text-base font-semibold text-gray-900">
      {{ product().price | currency:'COP':'symbol-narrow':'1.0-0' }}
    </p>
  </div>
</a>
